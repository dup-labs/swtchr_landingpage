<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SWTCHR — Em Breve</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #F9FAFC;
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #em-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Nav ── */
    #em-nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 56px;
      border-bottom: 1px solid rgba(13, 16, 21, 0.06);
      animation: fadeIn 0.5s ease-out both;
    }

    #em-nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #em-nav-logo svg {
      height: 17px;
      width: auto;
      filter: invert(1);
    }

    #em-nav-by {
      font-size: 11px;
      font-weight: 300;
      color: #8F94A7;
      letter-spacing: 0.05em;
    }

    #em-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 6px;
      background: rgba(99, 155, 252, 0.08);
      border: 1px solid rgba(99, 155, 252, 0.2);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #639BFC;
    }

    #em-badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #639BFC;
      display: block;
      flex-shrink: 0;
    }

    /* ── Headline ── */
    #em-headline {
      position: absolute;
      left: 56px;
      top: 50%;
      transform: translateY(-52%);
      z-index: 10;
      animation: slideUp 0.8s cubic-bezier(0.2, 0, 0, 1) 0.15s both;
    }

    #em-eyebrow {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #639BFC;
      margin-bottom: 20px;
    }

    #em-headline h1 {
      font-size: clamp(80px, 8.5vw, 128px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 0.92;
      color: #0D1015;
    }

    #em-divider {
      width: 40px;
      height: 1px;
      background: #DFE3EC;
      margin: 28px 0;
    }

    #em-headline p {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.7;
      color: #8F94A7;
      max-width: 280px;
      letter-spacing: 0.01em;
    }

    /* ── Card ── */
    #em-card {
      position: absolute;
      right: 56px;
      top: 50%;
      transform: translateY(-60%);
      z-index: 10;
      width: 270px;
      padding: 24px 26px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: slideUp 0.8s cubic-bezier(0.2, 0, 0, 1) 0.25s both;
    }

    #em-card p {
      font-size: 14px;
      line-height: 1.75;
      letter-spacing: 0.03em;
      color: #8F94A7;
    }

    #em-card strong {
      color: #0D1015;
      font-weight: 700;
    }

    /* ── Decorative icon top-right ── */
    #em-icon-arrows {
      position: absolute;
      right: 56px;
      top: calc(64px + 48px);
      z-index: 10;
      font-size: 36px;
      color: #DFE3EC;
      animation: fadeIn 0.6s ease-out 0.5s both;
    }

    /* ── Bottom icons ── */
    #em-icons-dec {
      position: absolute;
      left: 56px;
      bottom: 88px;
      z-index: 10;
      display: flex;
      animation: fadeIn 0.6s ease-out 0.6s both;
    }

    #em-icons-dec i {
      font-size: 22px;
      color: #DFE3EC;
    }

    #em-icons-dec i + i {
      padding-left: 8px;
    }

    /* ── Coords ── */
    #em-coords {
      position: absolute;
      left: 56px;
      bottom: 52px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.6s ease-out 0.55s both;
    }

    #em-palette {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .em-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: block;
    }

    #em-coords-label {
      font-size: 11px;
      color: #C5CBE0;
      letter-spacing: 0.06em;
    }

    /* ── Bottom right ── */
    #em-bottom-right {
      position: absolute;
      right: 56px;
      bottom: 52px;
      z-index: 10;
      font-size: 11px;
      color: #C5CBE0;
      letter-spacing: 0.06em;
      animation: fadeIn 0.6s ease-out 0.7s both;
    }

    /* ── Astronaut / video ── */
    #em-astronaut {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      width: 600px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      pointer-events: none;
    }

    #em-video,
    #em-frame {
      width: 100vw;
      bottom: -24px;
      position: relative;
    }

    #em-frame { display: none; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      #em-nav          { padding: 0 24px; }
      #em-headline     { left: 24px; right: 24px; top: 76px; transform: none; }
      #em-headline h1  { font-size: clamp(52px, 14vw, 72px); }
      #em-headline p   { max-width: 100%; font-size: 14px; }
      #em-card         { display: none; }
      #em-icon-arrows  { display: none; }
      #em-icons-dec    { display: none; }
      #em-coords       { left: 24px; bottom: 20px; flex-direction: column; align-items: flex-start; gap: 6px; }
      #em-bottom-right { display: none; }
      #em-video,
      #em-frame        { height: 60vh; width: auto; max-width: 100%; }
    }
  </style>
</head>

  <script>
    (function () {
      var video    = document.getElementById('em-video');
      var frameImg = document.getElementById('em-frame');
      var FRAME_COUNT = 60;
      var frames   = [];
      var canvas, ctx;

      function isTouchDevice() {
        return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      }

      function initCapture() {
        canvas        = document.createElement('canvas');
        ctx           = canvas.getContext('2d');
        canvas.width  = video.videoWidth  || 560;
        canvas.height = video.videoHeight || 900;

        var busy = false;

        function grabFrame() {
          if (busy) return;
          busy = true;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          frames.push(canvas.toDataURL('image/jpeg', 0.85));
          busy = false;
        }

        function onTimeUpdate() {
          var ratio    = video.currentTime / video.duration;
          var expected = Math.floor(ratio * FRAME_COUNT);
          while (frames.length < expected) grabFrame();
          if (frames.length >= FRAME_COUNT) {
            video.removeEventListener('timeupdate', onTimeUpdate);
            done();
          }
        }

        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', function () {
          while (frames.length < FRAME_COUNT) grabFrame();
          done();
        }, { once: true });

        video.currentTime = 0;
        video.play().catch(function () {});
      }

      function done() {
        video.pause();
        video.style.display = 'none';
        frameImg.src = frames[Math.floor(frames.length / 2)];
        frameImg.style.display = 'block';

        if (isTouchDevice()) {
          pingPong();
        } else {
          mouseScrub();
        }
      }

      function mouseScrub() {
        var N = frames.length;
        document.addEventListener('mousemove', function (e) {
          var ratio = Math.max(0, Math.min(1, e.clientX / window.innerWidth));
          frameImg.src = frames[Math.round(ratio * (N - 1))];
        });
      }

      function pingPong() {
        var N      = frames.length;
        var pos    = N / 2;
        var dir    = 1;
        var lastTs = null;
        var SPEED  = 30;

        function tick(ts) {
          requestAnimationFrame(tick);
          if (lastTs === null) { lastTs = ts; return; }
          var delta = Math.min((ts - lastTs) / 1000, 0.05);
          lastTs = ts;

          pos += dir * SPEED * delta;
          if (pos >= N - 1) { pos = N - 1; dir = -1; }
          else if (pos <= 0) { pos = 0;    dir =  1; }

          frameImg.src = frames[Math.round(pos)];
        }

        requestAnimationFrame(tick);
      }

      if (video.readyState >= 1 && video.duration) {
        initCapture();
      } else {
        video.addEventListener('loadedmetadata', initCapture, { once: true });
      }
    })();
  </script>
